services:
  backend:
    build:
      context: ./atgt_backend
      dockerfile: Dockerfile
    container_name: atgt-backend
    ports:
      - "8086:8086"
    volumes:
      - ./atgt_backend/data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/atgt;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_H2_CONSOLE_ENABLED=false
      - SERVER_PORT=8086
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8086}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# volumes section removed — using bind mount instead of named volume
